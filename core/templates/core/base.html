{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blood Donation System{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}?v=2.0">
</head>
<body class="{% block body_class %}dashboard-page{% endblock %}">
    <div class="site-shell">
        {% include 'core/navbar.html' %}

        {% if messages %}
            <div class="flash-stack">
                {% for message in messages %}
                    <div class="flash-message flash-{{ message.tags|default:'info' }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <script src="{% static 'js/script.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
